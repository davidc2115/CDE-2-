name: Build Android APK avec Expo

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK Android Expo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: artifacts/cde-app/package.json

      - name: Nettoyer les résidus
        working-directory: artifacts/cde-app
        run: |
          rm -rf node_modules
          rm -rf android/.gradle
          rm -rf android/app/build
          rm -f eas.json

      - name: Installer les dependances
        working-directory: artifacts/cde-app
        run: npm install --legacy-peer-deps

      - name: Securite post-install (Suppression forcee de worklets)
        working-directory: artifacts/cde-app
        run: rm -rf node_modules/react-native-worklets

      - name: Forcer le fichier eas.json requis par Expo CLI
        working-directory: artifacts/cde-app
        run: |
          echo '{
            "cli": { "version": ">= 0.0.0" },
            "build": {
              "release": { "distribution": "internal", "android": { "buildType": "apk" } }
            }
          }' > eas.json

      - name: Préparer le cache Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      - name: Assurer les permissions Gradle exécutées par Expo
        working-directory: artifacts/cde-app/android
        run: chmod +x gradlew

      - name: Compilation Directe avec Expo CLI
        working-directory: artifacts/cde-app
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=\"-Xmx4g -XX:MaxMetaspaceSize=512m\""
          # On injecte explicitement le chemin absolu de Node pour que les sous-processus d'Expo ne se perdent pas
          NODE_BINARY: /usr/local/bin/node
        run: |
          # npx expo prépare le bundle js puis invoque gradle en lui passant le bon environnement node
          npx expo run:android --variant release --no-packager

      - name: Localiser l'APK Généré
        run: find artifacts/cde-app/android -name "*.apk" | head -5

      - name: Téléverser l'APK dans les Artifacts GitHub
        uses: actions/upload-artifact@v4
        with:
          name: cde-expo-apk
          path: artifacts/cde-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Résumé du Build
        run: echo "L'APK compilé directement via Expo CLI est disponible au téléchargement." >> $GITHUB_STEP_SUMMARY
        
