name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Installer les dépendances
        working-directory: artifacts/cde-app
        run: pnpm install --no-frozen-lockfile

      - name: Gradle init script (repositories pour tous les builds inclus)
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'INITEOF'
          allprojects {
            buildscript {
              repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
                maven { url 'https://www.jitpack.io' }
              }
            }
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
              maven { url 'https://www.jitpack.io' }
            }
          }
          settingsEvaluated { settings ->
            settings.pluginManagement {
              repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
              }
            }
          }
          INITEOF

      - name: Setup Gradle (avec cache)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      - name: Permissions Gradle
        working-directory: artifacts/cde-app/android
        run: chmod +x gradlew

      - name: Compiler l'APK
        working-directory: artifacts/cde-app/android
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Localiser l'APK
        run: find artifacts/cde-app/android -name "*.apk" | head -5

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: cde-nettoyage-apk
          path: artifacts/cde-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Résumé
        run: |
          echo "## ✅ APK prêt !" >> $GITHUB_STEP_SUMMARY
          echo "Téléchargez l'APK dans la section **Artifacts** ci-dessous." >> $GITHUB_STEP_SUMMARY
