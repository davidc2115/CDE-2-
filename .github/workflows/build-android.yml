name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: artifacts/cde-app/package.json

      - name: Nettoyer les résidus obsolètes
        working-directory: artifacts/cde-app
        run: |
          rm -rf node_modules
          rm -rf android/.gradle
          rm -rf android/app/build
          rm -f eas.json

      - name: Installer les dependances
        working-directory: artifacts/cde-app
        run: npm install --legacy-peer-deps

      - name: Securite post-install (Suppression forcee de worklets si present)
        working-directory: artifacts/cde-app
        run: rm -rf node_modules/react-native-worklets

      - name: Générer le fichier eas.json au bon endroit
        working-directory: artifacts/cde-app
        run: |
          echo '{
            "cli": { "version": ">= 0.0.0" },
            "build": {
              "development": { "developmentClient": true, "distribution": "internal" },
              "preview": { "distribution": "internal", "android": { "buildType": "apk" } },
              "release": { "distribution": "internal", "android": { "buildType": "apk" } }
            },
            "submit": { "production": {} }
          }' > eas.json
          echo "eas.json créé avec succès."

      - name: Setup Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      - name: Permissions Gradle
        working-directory: artifacts/cde-app/android
        run: chmod +x gradlew

      - name: Compiler APK via Expo CLI
        working-directory: artifacts/cde-app
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=\"-Xmx4g -XX:MaxMetaspaceSize=512m\""
          REACT_NATIVE_VERSION: "0.81.5"
        run: npx expo run:android --variant release

      - name: Localiser APK
        run: find artifacts/cde-app/android -name "*.apk" | head -5

      - name: Publier APK
        uses: actions/upload-artifact@v4
        with:
          name: cde-nettoyage-apk
          path: artifacts/cde-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Resume
        run: echo "APK disponible dans Artifacts" >> $GITHUB_STEP_SUMMARY
        
