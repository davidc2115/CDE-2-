name: Générer l'APK Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Générer l'APK via Gradle
    runs-on: ubuntu-24.04

    steps:
      - name: Exécuter actions/checkout@v4
        uses: actions/checkout@v4

      - name: Configurer Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances NPM
        run: |
          cd artifacts/cde-app
          npm install --legacy-peer-deps

      - name: Nettoyer les anciens builds
        run: |
          cd artifacts/cde-app/android
          rm -rf .gradle build app/build

      - name: Configurer Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true # Évite de planter à cause de la panne réseau de cache de GitHub

      - name: Compiler l'APK avec le Wrapper local
        run: |
          cd artifacts/cde-app/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Téléverser l'APK généré
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: artifacts/cde-app/android/app/build/outputs/apk/release/app-release.apk
          
