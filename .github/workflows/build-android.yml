name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dependances
        working-directory: artifacts/cde-app
        run: npm install --legacy-peer-deps

      - name: Debug react-native depuis android
        working-directory: artifacts/cde-app/android
        run: node -e "const p=require.resolve('react-native/package.json');console.log('rn path:',p,'version:',require(p).version)"

      - name: Gradle init script
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << INITEOF
          allprojects {
            buildscript {
              repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
                maven { url 'https://www.jitpack.io' }
              }
            }
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
              maven { url 'https://www.jitpack.io' }
            }
          }
          INITEOF

      - name: Setup Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      - name: Permissions Gradle
        working-directory: artifacts/cde-app/android
        run: chmod +x gradlew

      - name: Patch react-native-worklets CMake
        working-directory: artifacts/cde-app
        run: |
          echo "=== Recherche du fichier CMakeLists.txt pour worklets ==="
          CMAKE_FILE=$(find node_modules/ -path "*/react-native-worklets*/android/CMakeLists.txt" | head -n 1)
          if [ -n "$CMAKE_FILE" ] && [ -f "$CMAKE_FILE" ]; then
            echo "Fichier trouvé : $CMAKE_FILE"
            echo "Application du patch pour injecter le fallback ReactAndroid::jsctooling..."
            # Injection sécurisée après l'appel find_package
            sed -i '/find_package(ReactAndroid REQUIRED)/a \if(NOT TARGET ReactAndroid::jsctooling)\n  add_library(ReactAndroid::jsctooling INTERFACE IMPORTED)\nendif()' "$CMAKE_FILE"
            echo "Contenu après modification (aperçu) :"
            grep -A 5 "find_package(ReactAndroid REQUIRED)" "$CMAKE_FILE"
          else
            echo "Alerte : Aucun fichier CMakeLists.txt trouvé pour worklets. Le build va tenter de continuer."
          fi

      - name: Compiler APK
        working-directory: artifacts/cde-app/android
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Localiser APK
        run: find artifacts/cde-app/android -name "*.apk" | head -5

      - name: Publier APK
        uses: actions/upload-artifact@v4
        with:
          name: cde-nettoyage-apk
          path: artifacts/cde-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Resume
        run: echo "APK disponible dans Artifacts" >> $GITHUB_STEP_SUMMARY
        
