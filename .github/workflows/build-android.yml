name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dependances
        working-directory: artifacts/cde-app
        run: npm install --legacy-peer-deps

      - name: Debug react-native depuis android
        working-directory: artifacts/cde-app/android
        run: node -e "const p=require.resolve('react-native/package.json');console.log('rn path:',p,'version:',require(p).version)"

      - name: Gradle init script
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << INITEOF
          allprojects {
            buildscript {
              repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
                maven { url 'https://www.jitpack.io' }
              }
            }
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
              maven { url 'https://www.jitpack.io' }
            }
          }
          INITEOF

      - name: Setup Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      - name: Permissions Gradle
        working-directory: artifacts/cde-app/android
        run: chmod +x gradlew

      - name: Compiler APK
        working-directory: artifacts/cde-app/android
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          REACT_NATIVE_VERSION: "0.81.5"
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Localiser APK
        run: find artifacts/cde-app/android -name "*.apk" | head -5

      - name: Publier APK
        uses: actions/upload-artifact@v4
        with:
          name: cde-nettoyage-apk
          path: artifacts/cde-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Resume
        run: echo "APK disponible dans Artifacts" >> $GITHUB_STEP_SUMMARY
