name: Build Android APK avec Gradle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK via Gradle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation des dépendances npm
        run: |
          cd artifacts/cde-app
          npm install --legacy-peer-deps

      - name: Nettoyage des caches Gradle locaux
        run: |
          cd artifacts/cde-app/android
          rm -rf .gradle build app/build

      - name: Configuration du cache Gradle global
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      - name: Autoriser l'exécution de Gradle
        run: |
          cd artifacts/cde-app/android
          chmod +x gradlew

      - name: Compilation de l'APK (assembleRelease)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"
          NODE_BINARY: /usr/local/bin/node
        run: |
          cd artifacts/cde-app/android
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-full.log
          exit ${PIPESTATUS[0]}

      - name: Afficher les erreurs CMake si echec
        if: failure()
        run: |
          echo "===== CMakeError.log ====="
          find /home/runner/work -name "CMakeError.log" 2>/dev/null | while read f; do
            echo "--- $f ---"; cat "$f"
          done
          echo "===== Extrait gradle-full.log (erreurs) ====="
          grep -i "error\|CMake Error\|FAILED\|Exception\|fatal" /tmp/gradle-full.log | grep -v "warning" | head -80 || true

      - name: Trouver l'APK genere
        run: find artifacts/cde-app/android/app/build/outputs/apk/ -name "*.apk"

      - name: Televerser l'APK final
        uses: actions/upload-artifact@v4
        with:
          name: cde-gradle-apk
          path: artifacts/cde-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 30