kind = "mobile"
previewPath = "/"
title = "CDE - Nettoyage & Entretien"
version = "1.0.0"
id = "artifacts/cde-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18448

[services.development]
run = "pnpm --filter @workspace/cde-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cde-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/cde-app", "run", "serve" ]

[services.env]
PORT = "18448"
BASE_PATH = "/"
