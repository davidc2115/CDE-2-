apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    // Use Expo CLI (export:embed) instead of react-native bundle
    // cliFile must be a File/RegularFile, not a String
    cliFile = project.file(
        new File(
            ["node", "--print", "require.resolve('@expo/cli/package.json')"]
                .execute(null, rootDir).text.trim()
        ).getParentFile().getAbsoluteFile().getPath() + "/build/bin/cli"
    )

    bundleCommand = "export:embed"

    // Resolve entry file via Expo's resolver (handles expo-router/entry)
    entryFile = project.file(
        ["node", "-e", "require('expo/scripts/resolveAppEntry')",
         rootDir.getAbsoluteFile().getParentFile().getAbsolutePath(),
         "android", "absolute"]
            .execute(null, rootDir).text.trim()
    )

    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion "27.1.12297006"
    buildToolsVersion "35.0.0"
    compileSdk 36

    namespace "com.cde.nettoyage"

    defaultConfig {
        applicationId "com.cde.nettoyage"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
