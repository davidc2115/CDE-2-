// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

subprojects { proj ->
  proj.configurations.all { config ->
    // Substitue l ancien artefact react-native par react-android (RN 0.71+)
    config.resolutionStrategy.dependencySubstitution {
      substitute(module("com.facebook.react:react-native"))
        .using(module("com.facebook.react:react-android:0.81.5"))
        .because("react-native artifact was renamed to react-android in RN 0.71+")
    }
    // Force la version 0.81.5 si la detection auto retourne vide
    config.resolutionStrategy.eachDependency { DependencyResolveDetails details ->
      if (details.requested.group == "com.facebook.react") {
        def v = details.requested.version
        if (!v || v.isEmpty() || v == ".") {
          details.useVersion("0.81.5")
        }
      }
    }
  }
}

// ---- Fix JVM Target Compatibility ----
// Align Kotlin and Java JVM targets across all subprojects.
// Java 17 is used in CI and by AGP 8.x by default.
// Kotlin must target the same JVM version to avoid:
//   "Inconsistent JVM Target Compatibility Between Java and Kotlin Tasks"
gradle.projectsEvaluated {
  subprojects { proj ->
    proj.tasks.withType(JavaCompile).configureEach {
      sourceCompatibility = JavaVersion.VERSION_17
      targetCompatibility = JavaVersion.VERSION_17
    }
    proj.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
      compilerOptions {
        jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
      }
    }
  }
}