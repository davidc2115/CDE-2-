// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

// Force react-native version 0.81.5 if auto-detection fails (empty version)
subprojects { proj ->
  proj.configurations.all { config ->
    config.resolutionStrategy.eachDependency { DependencyResolveDetails details ->
      if (details.requested.group == "com.facebook.react") {
        def requested = details.requested.version
        if (!requested || requested.isEmpty() || requested == ".") {
          details.useVersion("0.81.5")
          details.because("Force react-native 0.81.5 when auto-detection fails")
        }
      }
    }
  }
}
