// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"

subprojects { proj ->
  proj.configurations.all { config ->
    // Substitue l'ancien artefact react-native par react-android (RN 0.71+)
    config.resolutionStrategy.dependencySubstitution {
      substitute(module("com.facebook.react:react-native"))
        .using(module("com.facebook.react:react-android:0.81.5"))
        .because("react-native artifact was renamed to react-android in RN 0.71+")
    }
    // Force la version 0.81.5 si la détection auto retourne vide
    config.resolutionStrategy.eachDependency { DependencyResolveDetails details ->
      if (details.requested.group == "com.facebook.react") {
        def v = details.requested.version
        if (!v || v.isEmpty() || v == ".") {
          details.useVersion("0.81.5")
        }
      }
    }
  }
}

// ---- Fix JVM Target Compatibility ----
// expo-modules-core sets sourceCompatibility/targetCompatibility = 1.8 for Java.
// We need Kotlin to also target JVM 1.8 to avoid the "Inconsistent JVM Target" error.
// We do NOT touch JavaCompile tasks to avoid breaking the Android boot classpath.
gradle.projectsEvaluated {
  subprojects { proj ->
    proj.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
      kotlinOptions {
        jvmTarget = "1.8"
      }
    }
  }
}
